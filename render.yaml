# Render Blueprint for the backend service.
# The frontend deploys separately to Vercel (see the README Deployment section).
services:
  - type: web
    name: bizscout-monitor-backend
    runtime: node
    rootDir: backend
    plan: free
    # Install dev dependencies too, since the TypeScript build needs tsc.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # set in the Render dashboard (MongoDB Atlas connection string)
      - key: CORS_ORIGINS
        sync: false # set to your Vercel frontend URL, for example https://your-app.vercel.app
      - key: GEMINI_API_KEY
        sync: false # optional, enables the LLM features
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: MONITOR_INTERVAL_MS
        value: 300000
      - key: MONITOR_RUN_ON_START
        value: true
